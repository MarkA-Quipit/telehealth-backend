version: "3.9"

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: telehealth
      POSTGRES_PASSWORD: telehealth
      POSTGRES_DB: telehealth
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      target: builder
    working_dir: /app
    command: npm run dev
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - ./src:/app/src

volumes:
  pg_data:
